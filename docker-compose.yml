# docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Docker Compose lets you run all 3 services (backend, frontend, ML service)
# AND MongoDB with a single command: `docker-compose up`
#
# HOW IT WORKS:
# Each `service` is an isolated container. They communicate via the internal
# Docker network using service names as hostnames:
#   - backend connects to MongoDB at: mongodb://mongo:27017/smart-fertilizer
#   - backend calls ML service at:   http://ml-service:8000
#
# VOLUMES:
# `./backend:/app` maps your local backend folder INTO the container.
# Changes you make locally are reflected immediately (with nodemon).
#
# TO USE:
#   docker-compose up           → start all services
#   docker-compose up -d        → start in background
#   docker-compose down         → stop everything
#   docker-compose logs backend → view one service's logs
#
# NOTE: For development without Docker, just run each service manually
# following the README instructions.
# ─────────────────────────────────────────────────────────────────────────────

version: "3.8"

services:

  # ── MongoDB Database ────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: sf-mongo
    ports:
      - "27017:27017"        # expose to host so you can use MongoDB Compass
    volumes:
      - mongo-data:/data/db  # persist data between restarts
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sf-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/smart-fertilizer  # uses service name "mongo"
      - ML_SERVICE_URL=http://ml-service:8000            # uses service name "ml-service"
      - JWT_SECRET=${JWT_SECRET:-changethissecret}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
    volumes:
      - ./backend:/app       # hot reload — local changes reflect immediately
      - /app/node_modules    # don't override node_modules with local (empty) folder
    depends_on:
      mongo:
        condition: service_healthy
      ml-service:
        condition: service_started
    command: npm run dev

  # ── Python ML Microservice ──────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: sf-ml
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service:/app    # hot reload for Python too
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── React Frontend (dev server) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sf-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

# Named volume for MongoDB data persistence
volumes:
  mongo-data:
