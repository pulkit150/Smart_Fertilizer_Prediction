<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FertiSmart — Smart Fertilizer Recommendations</title>
  </head>
  <body>
    <!--
      This single <div id="root"> is where React attaches itself.
      React replaces the contents of this div with your entire app.
      This is called a "Single Page Application" (SPA) — one HTML file,
      JavaScript handles all navigation without full page reloads.
    -->
    <div id="root"></div>

    <!--
      type="module" tells the browser to load this as an ES Module.
      Vite intercepts this in dev mode and serves the file with hot reload.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
